<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MetaBelgica</title>
<link rel="icon" type="image/png" href="images/logo-metabelgica-light.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body {
    transition: background-color .3s ease, color .3s ease;
	padding-top: 80px;
}

/* TOP BAR */
.top-bar {
    position: sticky;
    top: 0;
    z-index: 1030;

    padding: 15px 0;

    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}

[data-bs-theme="light"] .top-bar {
    background: rgba(255, 255, 255, 0.92);
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
}

[data-bs-theme="dark"] .top-bar {
    background: rgba(33, 37, 41, 0.92);
    border-bottom: 1px solid rgba(255, 255, 255, 0.10);
}

.lang-btn.active {
    font-weight: 700;
}

/* HERO */
.hero {
    padding: 100px 0 70px;
    text-align: center;
}

.hero-logo {
    max-height: 120px;
    margin-bottom: 20px;
}

/* handled by JS swap */
.partner-logo {
    max-height: 70px;
    max-width: 160px;
    object-fit: contain;
    filter: grayscale(100%);
    opacity: 0.65;
    transition: all .3s ease;
}

.partner-logo:hover {
    filter: grayscale(0%);
    opacity: 1;
    transform: scale(1.05);
}

/* STATS */
.stat-card {
    transition: all .2s ease;
    border-radius: 18px;
    overflow: hidden;
	position: relative;
}
.stat-card:hover {
    transform: translateY(-4px);
}

.stat-icon {
    font-size: 3rem;
    color: var(--bs-primary);
    opacity: 0.9;
}

.counter {
    font-size: 3rem;
    font-weight: 700;
    margin: 15px 0 5px;
}

[data-bs-theme="light"] .stat-card::before,
[data-bs-theme="dark"] .stat-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    pointer-events: none;
}

[data-bs-theme="light"] .stat-card::before {
    background: linear-gradient(
        180deg,
        rgba(255,255,255,0.6),
        transparent 40%
    );
}

[data-bs-theme="dark"] .stat-card::before {
    background: linear-gradient(
        180deg,
        rgba(255,255,255,0.05),
        transparent 40%
    );
}

/* LIGHT MODE */
[data-bs-theme="light"] .stat-card {
    background: #ffffff;
    border: 1px solid rgba(0, 0, 0, 0.08);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
}

/* DARK MODE */
[data-bs-theme="dark"] .stat-card {
    background: #1f2933;
    border: 1px solid rgba(255, 255, 255, 0.10);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
}

[data-bs-theme="dark"] .stat-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
    border-color: rgba(255, 255, 255, 0.22);
}

[data-bs-theme="dark"] .stat-icon {
    color: #4dabf7;
    opacity: 1;
}

.partner-logo {
    cursor: pointer;
}

</style>
</head>

<body>

<!-- =========================
     TOP BAR
========================= -->


   <div class="top-bar">
	<div class="container">
	  <div class=" d-flex justify-content-between align-items-center">
        <div class="btn-group">

            <button class="btn btn-outline-secondary btn-sm lang-btn" data-lang="nl">🇳🇱 NL</button>
            <button class="btn btn-outline-secondary btn-sm lang-btn" data-lang="fr">🇫🇷 FR</button>
            <button class="btn btn-outline-secondary btn-sm lang-btn" data-lang="de">🇩🇪 DE</button>
            <button class="btn btn-outline-secondary btn-sm lang-btn" data-lang="en">🇬🇧 EN</button>

        </div>
      </div>

        <button id="themeToggle" class="btn btn-outline-primary">
            <i class="bi bi-moon-stars"></i>
        </button>

    </div>
</div>

<!-- =========================
     HERO
========================= -->
<section class="hero">

    <div class="container">

        <!-- Logos injected by JS -->

        <img id="heroLogo" class="hero-logo mx-auto" alt="MetaBelgica">

		<!-- The logo already contains the name, no need for a heading -->
        <!-- <h1 class="display-4 fw-bold">MetaBelgica</h1>-->

        <p id="intro" class="lead">
            Soon you will find here semantic reference data related to Belgian cultural heritage collections.
        </p>

    </div>

</section>

<!-- =========================
     STATS
========================= -->
<section class="py-5">

<div class="container">

<div class="row g-4">

    <div class="col-md-4">
        <div class="card stat-card text-center p-4">
            <i class="bi bi-people-fill stat-icon"></i>
            <div class="counter" data-target="965000" data-plus="true">0</div>
            <h3 id="persons-title">Persons</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card stat-card text-center p-4">
            <i class="bi bi-building stat-icon"></i>
            <div class="counter" data-target="14000" data-plus="true">0</div>
            <h3 id="org-title">Organizations</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card stat-card text-center p-4">
            <i class="bi bi-geo-alt-fill stat-icon"></i>
            <div class="counter" data-target="240000" data-plus="true">0</div>
            <h3 id="place-title">Linked Places</h3>
        </div>
    </div>

</div>

</div>

</section>

<!-- =========================
     PARTNERS
========================= -->
<section class="py-5 text-center">

<div class="container">

<h2 id="partners-title" class="mb-5">Participating Institutions</h2>

<div id="partnersRow" class="row justify-content-center g-4"></div>

</div>

</section>

<!-- =========================
     JS
========================= -->
<script>

/* =====================================================
   1. CENTRAL CONFIGURATION
===================================================== */

const CONFIG = {

    logos: {

        hero: {
            light: "images/logo-metabelgica-light.png",
            dark: "images/logo-metabelgica-dark.png"
        },

        partners: [
            {
                light: "images/logo-kbr-light.png",
                dark: "images/logo-kbr-dark.png",
				links: {
					"en": "https://www.kbr.be/en/",
					"nl": "https://www.kbr.be/nl/",
					"fr": "https://www.kbr.be/fr/",
					"de": "https://www.kbr.be/en"
				}
            },
            {
                light: "images/logo-rmfab-light.jpg",
                dark: "images/logo-rmfab-dark.png",
                alt: "Royal Museums of Fine Arts",
				links: {
					"en": "https://fine-arts-museum.be/en",
					"nl": "https://fine-arts-museum.be/nl",
					"fr": "https://fine-arts-museum.be/fr",
					"de": "https://fine-arts-museum.be/en"
				}
            },
            {
                light: "images/logo-kikirpa-light.png",
                dark: "images/logo-kikirpa-dark.png",
                alt: "Royal Institute for Cultural Heritage",
				links: {
					"en": "https://www.kikirpa.be/en/",
					"nl": "https://www.kikirpa.be/nl",
					"fr": "https://www.kikirpa.be/fr",
					"de": "https://fine-arts-museum.be/en"
				}
            },
            {
                light: "images/logo-rmah-light.jpg",
                dark: "images/logo-rmah-dark.png",
                alt: "Royal Museums of Art and History",
				links: {
					"en": "https://fine-arts-museum.be/en",
					"nl": "https://fine-arts-museum.be/nl",
					"fr": "https://fine-arts-museum.be/fr",
					"de": "https://fine-arts-museum.be/en"
				}
            },
            {
                light: "images/logo-belspo-light.jpg",
                dark: "images/logo-belspo-dark.png",
                alt: "Belgian Science Policy Office (BELSPO)",
				links: {
					"en": "https://www.belspo.be/belspo/index_en.stm",
					"nl": "https://www.belspo.be/belspo/index_nl.stm",
					"fr": "https://www.belspo.be/belspo/index_fr.stm",
					"de": "https://www.belspo.be/belspo/index_en.stm"
				}
            }
        ]
    }
};


/* =====================================================
   2. RENDER PARTNER LOGOS
===================================================== */

function renderPartners(theme) {

    const container =
        document.getElementById('partnersRow');

    container.innerHTML = "";

    CONFIG.logos.partners.forEach(p => {

        const img =
            document.createElement('img');

        img.className = "partner-logo img-fluid";
        img.alt = p.alt;

        img.dataset.light = p.light;
        img.dataset.dark = p.dark;

        img.src = theme === 'dark' ? p.dark : p.light;


		const currentLanguage =
			localStorage.getItem('language') || 'en';
        const link =
			document.createElement('a');

		link.target = "_blank";
		link.rel = "noopener noreferrer";

		/* Use language-specific URL if available */
		if (p.links && p.links[currentLanguage]) {
			link.href = p.links[currentLanguage];
		} else if (p.links && p.links.en) {
			link.href = p.links.en;
		} else {
			link.href = "#";
		}

		link.appendChild(img);

		const col =
			document.createElement('div');

		col.className = "col-6 col-md-2";

		col.appendChild(link);

		container.appendChild(col);
    });
}


/* =====================================================
   3. HERO LOGO SWITCH
===================================================== */

function setHeroLogo(theme) {

    const hero =
        document.getElementById('heroLogo');

    hero.src =
        theme === 'dark'
            ? CONFIG.logos.hero.dark
            : CONFIG.logos.hero.light;
}


/* =====================================================
   4. THEME
===================================================== */

const themeBtn =
    document.getElementById('themeToggle');

function setTheme(theme) {

    document.documentElement.setAttribute(
        'data-bs-theme',
        theme
    );

    localStorage.setItem('theme', theme);

    themeBtn.innerHTML =
        theme === 'dark'
            ? '<i class="bi bi-sun"></i>'
            : '<i class="bi bi-moon-stars"></i>';

    setHeroLogo(theme);
    renderPartners(theme);
}

themeBtn.addEventListener('click', () => {

    const current =
        document.documentElement.getAttribute('data-bs-theme');

    setTheme(current === 'dark' ? 'light' : 'dark');

});


/* =====================================================
   5. COUNTERS
===================================================== */

function formatNumber(value, showPlus) {

    let formatted = value.toLocaleString();

    return showPlus ? formatted + '+' : formatted;
}

const counters =
    document.querySelectorAll('.counter');

const observer =
    new IntersectionObserver(entries => {

        entries.forEach(entry => {

            if (!entry.isIntersecting) return;

            const counter =
                entry.target;

            const target =
                parseInt(counter.dataset.target);

            const showPlus =
                counter.dataset.plus === 'true';

            let current = 0;

            const step = target / 120;

            function update() {

                current += step;

                if (current < target) {

                    counter.textContent =
                        formatNumber(Math.floor(current), showPlus);

                    requestAnimationFrame(update);

                } else {

                    counter.textContent =
                        formatNumber(target, showPlus);
                }
            }

            update();

            observer.unobserve(counter);

        });

    }, { threshold: 0.5 });

counters.forEach(c => observer.observe(c));


/* =====================================================
   6. LANGUAGE
===================================================== */

const translations = {

    en: {
        intro: `Soon you will find here semantic reference data related to Belgian cultural heritage collections. Learn more at <a href="https://www.kbr.be/en/projects/metabelgica/" target="_blank">our project website</a>`,
        persons: "Persons",
        orgs: "Organizations",
        places: "Linked Places",
        partners: "Participating Institutions"
    },

    nl: {
        intro: `Binnenkort vindt u hier semantische referentiegegevens over Belgische collecties op het gebied van cultureel erfgoed. Meer informatie vindt u op <a href="https://www.kbr.be/nl/projects/metabelgica/" target="_blank">onze projectwebsite</a>`,
        persons: "Personen",
        orgs: "Organisaties",
        places: "Gekoppelde Plaatsen",
        partners: "Deelnemende Instellingen"
    },

    fr: {
        intro: `Vous trouverez bientôt ici des données de référence sémantiques relatives aux collections du patrimoine culturel belge. Pour en savoir plus, rendez-vous sur <a href="https://www.kbr.be/fr/projets/metabelgica/" target="_blank">le site web de notre projet</a>`,
        persons: "Personnes",
        orgs: "Organisations",
        places: "Lieux liés",
        partners: "Institutions participantes"
    },

    de: {
        intro: `In Kürze finden Sie hier semantische Referenzdaten (Normdaten) zu belgischen Kulturgutsammlungen. Weitere Informationen finden Sie auf <a href="https://www.kbr.be/en/projects/metabelgica/" target="_blank">unserer Projektwebsite</a>`,
        persons: "Personen",
        orgs: "Organisationen",
        places: "Verknüpfte Orte",
        partners: "Teilnehmende Institutionen"
    }
};

function setLanguage(lang) {
	currentLanguage = lang;
    document.documentElement.lang = lang;

    document.getElementById('intro').innerHTML =
        translations[lang].intro;

    document.getElementById('persons-title').textContent =
        translations[lang].persons;

    document.getElementById('org-title').textContent =
        translations[lang].orgs;

    document.getElementById('place-title').textContent =
        translations[lang].places;

    document.getElementById('partners-title').textContent =
        translations[lang].partners;

    localStorage.setItem('language', lang);

    document.querySelectorAll('.lang-btn')
        .forEach(b => {

            b.classList.toggle(
                'active',
                b.dataset.lang === lang
            );

        });
		
	const currentTheme =
    document.documentElement.getAttribute('data-bs-theme');

	renderPartners(currentTheme);
}

document.querySelectorAll('.lang-btn')
    .forEach(btn => {

        btn.addEventListener('click', () =>
            setLanguage(btn.dataset.lang)
        );

    });


/* =====================================================
   7. INIT
===================================================== */

document.addEventListener('DOMContentLoaded', () => {

    const savedTheme =
        localStorage.getItem('theme') || 'light';

    const savedLang =
        localStorage.getItem('language') || 'en';

    setTheme(savedTheme);
    setLanguage(savedLang);

    setHeroLogo(savedTheme);
    renderPartners(savedTheme);

});

</script>

</body>
</html>
